name: email-triage-env
version: "2.0.0"
description: >
  Real-world email triage and customer support automation RL environment.
  An AI agent reads incoming emails, classifies intent, and takes actions
  (reply, escalate, tag, archive) to maximize resolution quality.
  Features 4 difficulty tasks, dense reward shaping, thread tracking,
  and session-isolated concurrent episode support.

author: OpenEnv Hackathon Team
license: MIT
homepage: https://huggingface.co/spaces/ash1809/void

tasks:
  - id: easy
    name: Single Email Triage
    difficulty: easy
    max_steps: 5
    success_threshold: 0.70
    description: >
      One incoming email. Correctly classify its intent and apply the right tag.
      Spam emails must be archived.

  - id: medium
    name: Multi-Email Resolution
    difficulty: medium
    max_steps: 10
    success_threshold: 0.65
    description: >
      Mixed inbox of 3 emails. Classify each, write professional replies for
      actionable emails, and archive spam.

  - id: hard
    name: Multi-Turn Escalation and Prioritization
    difficulty: hard
    max_steps: 20
    success_threshold: 0.60
    description: >
      Complex inbox of 5 emails including urgent crises, a multi-turn complaint
      thread, a refund, and spam. Requires urgency-based prioritization, thread
      context tracking, and appropriate escalation decisions.

  - id: extreme
    name: Full Inbox Blitz — Executive Triage
    difficulty: extreme
    max_steps: 35
    success_threshold: 0.50
    description: >
      Ten emails overnight: system-down alert, two complaint threads needing
      escalation, medical emergency refund, standard inquiries, spam, and abuse.
      Ruthless prioritization required within 35 steps.

observation_space:
  type: structured
  schema: Observation
  fields:
    current_email:
      type: object
      schema: EmailItem
      nullable: true
    inbox:
      type: array
      items: EmailItem
    resolved_emails:
      type: array
      items: string
    history:
      type: array
      items: object
      description: Action history with step, action_type, email_id, reward, breakdown
    step_count:
      type: integer
    remaining_steps:
      type: integer
    task_id:
      type: string
    task_description:
      type: string
    episode_reward:
      type: number

action_space:
  type: discrete_plus_text
  schema: Action
  fields:
    type:
      type: string
      enum: [classify, reply, escalate, archive, tag]
      required: true
    email_id:
      type: string
      required: true
      description: ID of the target email
    classification:
      type: string
      nullable: true
      required_for: classify
      enum: [complaint, refund, inquiry, spam, urgent, abuse]
    content:
      type: string
      nullable: true
      required_for: [reply, tag]
      description: Reply text (min 20 words for full score) or tag label
  actions:
    classify:
      description: Classify email intent. Required field — classification (string).
    reply:
      description: Send a reply. Required field — content (string, min 20 words).
    escalate:
      description: Escalate to senior support. Optional — content (escalation notes).
    archive:
      description: Archive the email. Use only for spam.
    tag:
      description: Apply an informational tag. Must classify first.

reward_range: [-1.0, 1.0]
reward_components:
  correct_classification:    +0.30
  correct_action:            +0.20
  reply_tone:                +0.20
  reply_completeness:        +0.10
  urgency_prioritization:    +0.20
  penalties:
    wrong_classification:    -0.30
    ignored_urgent:          -0.20
    redundant_action:        -0.10
    invalid_email_id:        -0.10

episode:
  max_steps: 35
  termination_conditions:
    - all emails resolved
    - max_steps reached

sessions:
  supported: true
  header: X-Session-ID
  description: >
    Pass X-Session-ID header for isolated concurrent environment instances.

api:
  base_url: https://ash1809-void.hf.space/api
  endpoints:
    reset:
      method: POST
      path: /reset
      body: { task_id: string }
    step:
      method: POST
      path: /step
      body: { action: Action }
    state:
      method: GET
      path: /state
    tasks:
      method: GET
      path: /tasks
    grader:
      method: POST
      path: /grader
      body: { task_id: string, history: array, email_ids: array }
    baseline:
      method: POST
      path: /baseline
      body: { task_id: string, mock: boolean }

docker:
  image: email-triage-env
  ports:
    backend: 8000
  build_command: docker build -t email-triage-env .
  run_command: docker run -p 8000:8000 email-triage-env
